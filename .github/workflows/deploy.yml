name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        type: choice
        required: true
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ github.ref }}-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ---- identity-svc ----------------------------------------------------
  identity:
    name: identity-svc
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'packages/services/identity-svc/') ||
      contains(github.event.head_commit.added, 'packages/services/identity-svc/') ||
      contains(github.event.head_commit.modified, 'packages/shared/') ||
      contains(github.event.head_commit.added, 'packages/shared/')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Migrations first — if this fails the deploy aborts and the old
      # Worker keeps running. That's the right precedence.
      - name: Apply D1 migrations (${{ github.event.inputs.environment || 'staging' }})
        working-directory: packages/services/identity-svc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          npx wrangler d1 migrations apply identity-db --env "$ENV" --remote

      - name: Deploy identity-svc
        working-directory: packages/services/identity-svc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          npx wrangler deploy --env "$ENV"

  # ---- auth-gateway ---------------------------------------------------
  gateway:
    name: auth-gateway
    runs-on: ubuntu-latest
    needs: [identity]
    if: |
      always() &&
      (needs.identity.result == 'success' || needs.identity.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' ||
       contains(github.event.head_commit.modified, 'packages/services/auth-gateway/') ||
       contains(github.event.head_commit.added, 'packages/services/auth-gateway/') ||
       contains(github.event.head_commit.modified, 'packages/shared/') ||
       contains(github.event.head_commit.added, 'packages/shared/'))
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy auth-gateway
        working-directory: packages/services/auth-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          npx wrangler deploy --env "$ENV"
