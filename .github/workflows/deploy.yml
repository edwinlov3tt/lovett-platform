name: Deploy

on:
  push:
    branches: [main]
    # Skip docs-only pushes at the workflow level. Per-service gating
    # happens further down via dorny/paths-filter, which (unlike
    # `head_commit.modified`) correctly inspects the full push diff
    # range — important when a single push contains several commits.
    paths:
      - "packages/services/identity-svc/**"
      - "packages/services/auth-gateway/**"
      - "packages/shared/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        type: choice
        required: true
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ github.ref }}-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ---- diff-range path detection --------------------------------------
  # Runs only on push (workflow_dispatch always deploys both services).
  # Outputs booleans the per-service jobs gate on.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      identity: ${{ steps.filter.outputs.identity }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity:
              - 'packages/services/identity-svc/**'
              - 'packages/shared/**'
            gateway:
              - 'packages/services/auth-gateway/**'
              - 'packages/shared/**'

  # ---- identity-svc ----------------------------------------------------
  identity:
    name: identity-svc
    runs-on: ubuntu-latest
    needs: [changes]
    # `!cancelled()` lets this run when `changes` is skipped (the
    # workflow_dispatch path) without blindly running on `changes`
    # failure — empty outputs there short-circuit the second clause.
    if: |
      !cancelled() &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.identity == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Migrations first — if this fails the deploy aborts and the old
      # Worker keeps running. That's the right precedence.
      - name: Apply D1 migrations (${{ github.event.inputs.environment || 'staging' }})
        working-directory: packages/services/identity-svc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          npx wrangler d1 migrations apply identity-db --env "$ENV" --remote

      - name: Deploy identity-svc
        working-directory: packages/services/identity-svc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          npx wrangler deploy --env "$ENV"

  # ---- auth-gateway ---------------------------------------------------
  gateway:
    name: auth-gateway
    runs-on: ubuntu-latest
    needs: [changes, identity]
    if: |
      !cancelled() &&
      (needs.identity.result == 'success' || needs.identity.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.gateway == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy auth-gateway
        working-directory: packages/services/auth-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          npx wrangler deploy --env "$ENV"
