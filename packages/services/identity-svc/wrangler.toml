name = "identity-svc"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------
# Intentionally NO `routes` block. Identity is internal-only — it
# must never be reachable from the public internet. The only way
# to invoke it is via a Workers RPC service binding from another
# Worker in the same Cloudflare account (e.g. auth-gateway).
# ---------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "identity-db"
database_id = "local_dev_identity_db"   # replaced per-env below
migrations_dir = "migrations"

[observability]
enabled = true

# ---- env vars (non-secret) live here. Secrets via `wrangler secret put`:
#   JWT_SECRET        — HS256 signing key. Must match auth-gateway's.
# ---------------------------------------------------------------

[env.staging]
name = "identity-svc-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "identity-db"
database_id = "21f8287f-ad3f-4ccd-b1a2-bc3e6f3ed3bf"
migrations_dir = "migrations"

[env.production]
name = "identity-svc-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "identity-db-prod"
database_id = "02467d91-4a2f-4913-85d5-ead716743a7d"
migrations_dir = "migrations"
