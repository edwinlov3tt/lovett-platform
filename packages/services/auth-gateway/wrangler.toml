name = "auth-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Public. Custom domains are attached per environment below
# (see [[env.staging.routes]] / [[env.production.routes]]).
# Setting `custom_domain = true` makes Wrangler auto-create the proxied
# DNS record on the zone — provided the zone is on this CF account.

# Identity is reached over an RPC service binding — never fetch-over-HTTP.
[[services]]
binding = "IDENTITY"
service = "identity-svc"

[observability]
enabled = true

# ---- env vars (non-secret) ------------------------------------------------
# Secrets (set per env via `wrangler secret put <NAME> --env <env>`):
#   JWT_SECRET              — HS256 signing key. Must match identity-svc.
#   EMAILIT_API_KEY         — Emailit transactional sender key. See ADR 0004.
#                             Leave unset locally → NoopEmailSender logs a line.
# --------------------------------------------------------------------------

[vars]
# Local dev defaults. Override per deploy env below.
MAGIC_LINK_FROM_ADDRESS = "noreply@edwinlovett.app"
EMAILIT_API_BASE_URL = "https://api.emailit.com/v2"
COOKIE_DOMAIN = "localhost"                           # parent-scope for cross-subdomain SSO
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:8787"
ALLOWED_REDIRECT_HOSTS = "localhost,127.0.0.1"
PLATFORM_NAME = "Lovett Platform"
GATEWAY_ORIGIN = "http://localhost:8787"

# ---- staging ------------------------------------------------------------

[env.staging]
name = "auth-gateway-staging"

[[env.staging.services]]
binding = "IDENTITY"
service = "identity-svc-staging"

[[env.staging.routes]]
pattern = "auth-staging.edwinlovett.com"
custom_domain = true

[env.staging.vars]
MAGIC_LINK_FROM_ADDRESS = "noreply@edwinlovett.app"
EMAILIT_API_BASE_URL = "https://api.emailit.com/v2"
COOKIE_DOMAIN = ".edwinlovett.com"
ALLOWED_ORIGINS = "https://auth-staging.edwinlovett.com,https://*.edwinlovett.com"
ALLOWED_REDIRECT_HOSTS = "edwinlovett.com"
PLATFORM_NAME = "Lovett Platform (staging)"
GATEWAY_ORIGIN = "https://auth-staging.edwinlovett.com"

# ---- production ---------------------------------------------------------

[env.production]
name = "auth-gateway-prod"

[[env.production.services]]
binding = "IDENTITY"
service = "identity-svc-prod"

[env.production.vars]
MAGIC_LINK_FROM_ADDRESS = "noreply@edwinlovett.app"
EMAILIT_API_BASE_URL = "https://api.emailit.com/v2"
COOKIE_DOMAIN = ".edwinlovett.com"
ALLOWED_ORIGINS = "https://*.edwinlovett.com"
ALLOWED_REDIRECT_HOSTS = "edwinlovett.com"
PLATFORM_NAME = "Lovett Platform"
GATEWAY_ORIGIN = "https://auth.edwinlovett.com"
